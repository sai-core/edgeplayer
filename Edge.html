<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDGE PLAYER</title>
<style>
:root {
    --accent: #ff0516;
    --accent-glow: rgba(255, 5, 22, 0.5);
    --bg-dark: #020203;
    --panel-bg: rgba(15, 15, 18, 0.75);
    --blur-val: 20px;
}

/* Scroll blocks to prevent mobile screen cut shifting */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', -apple-system, sans-serif;
}

body {
    background: var(--bg-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 12px;
    overflow-x: hidden; /* Stops horizontal scrolling entirely */
    position: relative;
    transition: background 0.4s ease;
}

body.theater-active { background: #000001; }

/* Top Bar is strictly STATIC - No dimming, No camouflage */
.top-bar-container { 
    opacity: 1 !important; 
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    width: 100%;
}

/* Constrained Responsive Ambilight Canvas */
#ambilight-canvas {
    position: absolute;
    width: 100%;
    height: 100%;
    max-width: 950px;
    max-height: 550px;
    z-index: 1;
    filter: blur(50px) brightness(1.2) contrast(1.2);
    pointer-events: none;
    transform: scale(1.08);
    opacity: 0;
    transition: opacity 0.4s ease;
}

/* Master Responsive Fluid Wrapper Container */
.player-container {
    width: 100%;
    max-width: 1050px;
    z-index: 2;
    position: relative;
}

.url-box {
    flex: 1;
    display: flex;
    gap: 10px;
    background: var(--panel-bg);
    padding: 6px;
    border-radius: 14px;
    backdrop-filter: blur(var(--blur-val));
    -webkit-backdrop-filter: blur(var(--blur-val));
    border: 1px solid rgba(255,255,255,0.05);
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}
.url-box input {
    flex: 1;
    padding: 12px 14px;
    border: none;
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.5);
    color: #fff;
    outline: none;
    font-size: 13px;
    transition: 0.3s;
    border: 1px solid transparent;
}
.url-box input:focus { border-color: rgba(255, 5, 22, 0.3); background: rgba(0, 0, 0, 0.7); }
.url-box button {
    padding: 0 18px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    transition: 0.2s;
    box-shadow: 0 4px 12px var(--accent-glow);
}
.url-box button:hover { background: #ff2332; transform: translateY(-1px); }

/* Adaptive Premium Glass Ambient Light Switch Box */
.ambient-toggle-box {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    background: var(--panel-bg);
    padding: 12px 16px;
    border-radius: 14px;
    backdrop-filter: blur(var(--blur-val));
    border: 1px solid rgba(255,255,255,0.05);
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    user-select: none;
    color: rgba(255, 255, 255, 0.8);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
}
.switch { position: relative; display: inline-block; width: 38px; height: 20px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; inset: 0; background-color: rgba(255,255,255,0.15); transition: .3s; border-radius: 34px; }
.slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
input:checked + .slider { background-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
input:checked + .slider:before { transform: translateX(18px); }

/* Cinema Canvas Aspect Frame */
.tv-frame {
    position: relative;
    border-radius: 16px;
    background: #000;
    overflow: hidden;
    box-shadow: 0 30px 70px rgba(0,0,0,0.9);
    border: 1px solid rgba(255,255,255,0.04);
    width: 100%;
}
.video-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }

video { width: 100%; height: 100%; display: block; object-fit: contain; background: #000; }
iframe { position: absolute; top:0; left:0; width: 100%; height: 100%; border: none; display: none; z-index: 4; }

.interaction-layer { position: absolute; inset: 0; z-index: 5; display: flex; }
.zone { height: 100%; pointer-events: auto; }
.side-zone { width: 22%; } 
.center-zone { width: 56%; }

.spinner-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 6; display: none; }
.spinner { width: 44px; height: 44px; border: 4px solid rgba(255, 5, 22, 0.1); border-left-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* Intelligent Bottom Control Bar Controls overlay Dashboard */
.controls {
    position: absolute; left: 0; bottom: 0; width: 100%;
    padding: 40px 16px 16px 16px;
    background: linear-gradient(to top, rgba(2,2,3,1) 0%, rgba(2,2,3,0.85) 55%, rgba(2,2,3,0) 100%);
    transition: opacity 0.15s ease, transform 0.15s ease; z-index: 7;
    display: flex; flex-direction: column; gap: 10px;
}
.hide { opacity: 0; pointer-events: none; transform: translateY(6px); }

.progress-container { position: relative; width: 100%; display: flex; align-items: center; cursor: pointer; }
.seek {
    -webkit-appearance: none; appearance: none; width: 100%; background: rgba(255, 255, 255, 0.2); height: 4px; border-radius: 4px; outline: none; margin: 0; transition: height 0.1s; position: relative; z-index: 2;
}
.progress-container:hover .seek { height: 5px; }
.seek::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 0px; height: 0px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: 0.1s; }
.progress-container:hover .seek::-webkit-slider-thumb { width: 10px; height: 10px; }

.row { display: flex; align-items: center; justify-content: space-between; position: relative; width: 100%; }
.controls-center { display: flex; align-items: center; gap: 16px; position: absolute; left: 50%; transform: translateX(-50%); }

.btn { width: 34px; height: 34px; border: none; border-radius: 50%; background: transparent; color: rgba(255, 255, 255, 0.7); cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; }
.btn svg { width: 16px; height: 16px; fill: currentColor; }
.btn:hover { color: #fff; background: rgba(255, 255, 255, 0.08); }
#playBtn { background: rgba(255,255,255,0.08); color: #fff; width: 38px; height: 38px; }
#playBtn:hover { background: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

.time { color: rgba(255, 255, 255, 0.5); font-size: 11px; font-weight: 500; font-variant-numeric: tabular-nums; }
.right-controls-group { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.speed-badge { background: rgba(255,255,255,0.08); color: #ccc; font-size: 10px; font-weight: 600; padding: 4px 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
.speed-badge:hover { background: rgba(255,255,255,0.2); color: #fff; }

.lock-btn {
    position: absolute; top: 12px; left: 12px; z-index: 8; background: rgba(10,10,12,0.6); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.lock-btn.locked { color: #fff; background: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }

.toast {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: rgba(10, 10, 12, 0.85); backdrop-filter: blur(10px); color: #fff; padding: 10px 20px; border-radius: 30px; opacity: 0; transition: all 0.15s; z-index: 9; pointer-events: none; font-weight: 600; font-size: 12px; border: 1px solid rgba(255, 255, 255, 0.08); display: flex; align-items: center; gap: 6px; box-shadow: 0 20px 40px rgba(0,0,0,0.7);
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

/* 📱 🖥️ RESPONSIVE MASTER AUTO ADJUSTMENT QUERIES */
@media (max-width: 768px) {
    body { padding: 8px; }
    .top-bar-container { flex-direction: column; align-items: stretch; gap: 10px; margin-bottom: 12px; }
    .url-box { border-radius: 12px; padding: 5px; }
    .url-box input { padding: 10px 12px; font-size: 12px; }
    .url-box button { padding: 0 14px; font-size: 12px; }
    .ambient-toggle-box { padding: 10px 14px; border-radius: 12px; width: 100%; justify-content: space-between; }
    .tv-frame { border-radius: 12px; }
    .controls { padding: 30px 12px 12px 12px; }
    .controls-center { gap: 12px; }
    .btn { width: 30px; height: 30px; }
    #playBtn { width: 34px; height: 34px; }
}
</style>
</head>
<body>

<canvas id="ambilight-canvas"></canvas>

<div class="player-container">
    <div class="top-bar-container">
        <div class="url-box">
            <input id="url" placeholder="Paste MP4 link OR YouTube Watch link..." value="">
            <button onclick="loadVideo()">Stream Studio</button>
        </div>
        
        <div class="ambient-toggle-box" id="ambientTogglePanel">
            <span>Ambient Mode ⋆‧°𓏲ּ𝄢</span>
            <label class="switch">
                <input type="checkbox" id="ambientSwitch" checked onchange="toggleAmbientEngine()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="tv-frame" id="mainContainer">
        <div class="video-wrap">
            
            <iframe id="ytPlayer" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>

            <div class="lock-btn" id="lockBtn" onclick="toggleLock()">
                <svg id="lockIcon" viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor;"><path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2 v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6-5c1.66 0 3 1.34 3 3v2H9V6c0-1.66 1.34-3 3-3z"/></svg>
            </div>

            <div class="interaction-layer" id="interactionGrid">
                <div class="zone side-zone" id="leftZone"></div>
                <div class="zone center-zone" id="centerZone"></div>
                <div class="zone side-zone" id="rightZone"></div>
            </div>

            <div class="spinner-container" id="loadingSpinner"><div class="spinner"></div></div>
            <div id="toast" class="toast"></div>

            <video id="player" playsinline preload="auto"></video>

            <div id="controls" class="controls">
                <div class="progress-container">
                    <input type="range" id="seek" class="seek" value="0" min="0" step="0.1">
                </div>
                <div class="row">
                    <div id="time" class="time">00:00 / 00:00</div>
                    
                    <div class="controls-center">
                        <button class="btn" onclick="backward()">
                            <svg viewBox="0 0 24 24"><path d="M12 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
                        </button>
                        <button class="btn" id="playBtn" onclick="togglePlay()">
                            <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                        <button class="btn" onclick="forward()">
                            <svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
                        </button>
                    </div>

                    <div class="right-controls-group">
                        <div class="speed-badge" id="speedBtn" onclick="changeSpeed()">1.0x</div>
                        <button class="btn full" onclick="goFull()">
                            <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const player = document.getElementById('player');
const ytPlayer = document.getElementById('ytPlayer');
const seek = document.getElementById('seek');
const controls = document.getElementById('controls');
const playIcon = document.getElementById('playIcon');
const mainContainer = document.getElementById('mainContainer');
const canvas = document.getElementById('ambilight-canvas');
const spinner = document.getElementById('loadingSpinner');
const lockBtn = document.getElementById('lockBtn');
const ambientSwitch = document.getElementById('ambientSwitch');
const interactionGrid = document.getElementById('interactionGrid');
const ambientTogglePanel = document.getElementById('ambientTogglePanel');
const ctx = canvas.getContext('2d');
let hideTimer, ambilightId, isLocked = false, ambientEnabled = true, isYouTubeMode = false;

const playPath = '<path d="M8 5v14l11-7z"/>';
const pausePath = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
const speeds = [1.0, 1.25, 1.5, 2.0, 0.5];
let currentSpeedIdx = 0;

function getYouTubeId(url) {
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = url.match(regExp);
    return (match && match[2].length === 11) ? match[2] : null;
}

function loadVideo(){
 const url = document.getElementById('url').value.trim();
 if(!url) return;
 const ytId = getYouTubeId(url);
 
 if(ytId) {
     isYouTubeMode = true; player.pause(); player.style.display = 'none';
     controls.style.display = 'none'; interactionGrid.style.display = 'none';
     lockBtn.style.display = 'none'; canvas.style.opacity = '0';
     ambientTogglePanel.style.opacity = '0.3'; cancelAnimationFrame(ambilightId);
     ytPlayer.src = `https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1`;
     ytPlayer.style.display = 'block'; showToast("YouTube Mode");
 } else {
     isYouTubeMode = false; ytPlayer.src = ''; ytPlayer.style.display = 'none';
     player.style.display = 'block'; controls.style.display = 'flex';
     interactionGrid.style.display = 'flex'; lockBtn.style.display = 'flex';
     ambientTogglePanel.style.opacity = '1'; spinner.style.display = 'block';
     
     player.removeAttribute('crossorigin'); 
     player.src = url; 
     player.load();
     player.play().catch(e => console.log("Playing."));
     showControlsInstant(); playIcon.innerHTML = pausePath;
 }
}

function toggleAmbientEngine() {
    if(isYouTubeMode) return;
    ambientEnabled = ambientSwitch.checked;
    if (!ambientEnabled) {
        canvas.style.opacity = "0"; cancelAnimationFrame(ambilightId); showToast("Glow Off");
    } else {
        if (!player.paused && !player.ended) { canvas.style.opacity = "0.65"; renderAmbilight(); }
        showToast("Glow On");
    }
}

function toggleLock() {
    if(isYouTubeMode) return;
    isLocked = !isLocked;
    if(isLocked) {
        lockBtn.classList.add('locked'); controls.classList.add('hide');
        lockBtn.innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor;"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>';
        showToast('Screen Locked');
    } else {
        lockBtn.classList.remove('locked');
        lockBtn.innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor;"><path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6-5c1.66 0 3 1.34 3 3v2H9V6c0-1.66 1.34-3 3-3z"/></svg>';
        showToast('Screen Unlocked'); showControlsInstant();
    }
}

function changeSpeed() {
    if(isLocked || isYouTubeMode) return;
    currentSpeedIdx = (currentSpeedIdx + 1) % speeds.length;
    const currentSpeed = speeds[currentSpeedIdx];
    player.playbackRate = currentSpeed;
    document.getElementById('speedBtn').innerText = currentSpeed + 'x';
    showToast(`Speed: ${currentSpeed}x`);
}

function togglePlay(){
 if(isLocked || isYouTubeMode) return;
 if(player.paused){ player.play(); playIcon.innerHTML = pausePath; } 
 else { player.pause(); playIcon.innerHTML = playPath; }
 showControlsInstant();
}

function forward(){ if(isLocked || isYouTubeMode) return; player.currentTime += 10; showToast('↺ 10s'); showControlsInstant(); }
function backward(){ if(isLocked || isYouTubeMode) return; player.currentTime -= 10; showToast('↻ 10s'); showControlsInstant(); }

function goFull(){
 if(isLocked) return;
 if (!document.fullscreenElement) mainContainer.requestFullscreen().catch(err => console.log(err.message));
 else document.exitFullscreen();
}

function showToast(text){
 const el = document.getElementById('toast'); el.innerText = text; el.classList.add('show');
 clearTimeout(el.timer); el.timer = setTimeout(() => el.classList.remove('show'), 500);
}

function fmt(seconds){
 seconds = Math.floor(seconds || 0);
 const m = String(Math.floor(seconds / 60)).padStart(2, '0');
 const s = String(seconds % 60).padStart(2, '0');
 return `${m}:${s}`;
}

function updateProgressBarLook() {
    const value = (seek.value / seek.max) * 100;
    seek.style.background = `linear-gradient(to right, var(--accent) 0%, var(--accent) ${value}%, rgba(255, 255, 255, 0.2) ${value}%, rgba(255, 255, 255, 0.2) 100%)`;
}

function renderAmbilight() {
    if (!ambientEnabled || isYouTubeMode) return;
    if (!player.paused && !player.ended) {
        try {
            ctx.drawImage(player, 0, 0, canvas.width, canvas.height);
        } catch(e) {}
    }
    ambilightId = requestAnimationFrame(renderAmbilight);
}

player.addEventListener('waiting', () => { if(!isYouTubeMode) spinner.style.display = 'block'; });
player.addEventListener('playing', () => { spinner.style.display = 'none'; });
player.addEventListener('canplay', () => { spinner.style.display = 'none'; });

player.addEventListener('play', () => {
    if (ambientEnabled && !isYouTubeMode) { canvas.style.opacity = "0.65"; renderAmbilight(); }
    document.body.classList.add('theater-active');
});
player.addEventListener('pause', () => { 
    cancelAnimationFrame(ambilightId); document.body.classList.remove('theater-active');
});

player.addEventListener('loadedmetadata', () => {
    seek.max = player.duration || 0; canvas.width = 48; canvas.height = 27;
    updateProgressBarLook(); spinner.style.display = 'none';
});

player.addEventListener('timeupdate', () => {
 if(!seek.matches(':focus')) { seek.value = player.currentTime; updateProgressBarLook(); }
 document.getElementById('time').textContent = `${fmt(player.currentTime)} / ${fmt(player.duration)}`;
});

seek.addEventListener('input', () => { 
    if(isLocked || isYouTubeMode) return;
    player.currentTime = seek.value; updateProgressBarLook(); showControlsInstant(); 
});

function showControlsInstant(){
 if(isLocked || isYouTubeMode) return;
 controls.classList.remove('hide'); clearTimeout(hideTimer);
 if(!player.paused) hideTimer = setTimeout(() => controls.classList.add('hide'), 4000); 
}

function hideControlsInstant() { if(!player.paused) controls.classList.add('hide'); }

mainContainer.addEventListener('mousemove', showControlsInstant);
mainContainer.addEventListener('mouseleave', hideControlsInstant);

/* 🛠️ FIXED ZONE INTERACTION LOGIC (Separates single tap vs double tap perfectly) */
function configureZone(zoneId, doubleTapAction, isCenter = false) {
 const el = document.getElementById(zoneId);
 let lastClick = 0, timer = null;

 el.addEventListener('click', (e) => {
 e.preventDefault();
 if(isLocked || isYouTubeMode) return;
 
 const current = Date.now();
 if(current - lastClick < 2500) { 
     // Double Tap Triggered
     if (timer) clearTimeout(timer); 
     doubleTapAction(); 
 } 
 else { 
     // Single Tap Triggered (Toggles UI visibility only)
     timer = setTimeout(() => {
         if (controls.classList.contains('hide')) { 
             showControlsInstant(); 
         } else { 
             hideControlsInstant(); 
         }
     }, 2000); 
 }
 lastClick = current;
 });
}

configureZone('leftZone', backward); 
configureZone('centerZone', togglePlay, true); 
configureZone('rightZone', forward);

document.addEventListener('keydown', (e) => {
 if(document.activeElement.tagName === 'INPUT' || isLocked || isYouTubeMode) return;
 if(e.key === ' ') { e.preventDefault(); togglePlay(); }
 if(e.key === 'ArrowRight') { e.preventDefault(); forward(); }
 if(e.key === 'ArrowLeft') { e.preventDefault(); backward(); }
 if(e.key.toLowerCase() === 'f') { e.preventDefault(); goFull(); }
});

window.onload = () => {
    loadVideo();
};
</script>
</body>
</html>
